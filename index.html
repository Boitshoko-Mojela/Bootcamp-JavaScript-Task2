<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grading Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Grading System</h2>

    <form id="gradeForm">
        <div class="form-group">
            <label for="studentName">Student Name:</label>
            <input type="text" id="studentName" placeholder="Enter student's name" required>
        </div>

        <div class="form-group">
            <label for="studentMark">Mark (0–100):</label>
            <input type="number" id="studentMark" min="0" max="100" placeholder="Enter mark" required>
        </div>

        <button type="submit" id="submitBtn">Submit Result</button>
    </form>

    <div id="resultArea" class="result-box hidden"></div>

    <h3>Submission History</h3>
    <ul id="studentList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
